services:
  - type: web
    name: task-helper-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        value: REPLACE_WITH_MONGO_URI
      - key: JWT_SECRET
        value: REPLACE_WITH_JWT_SECRET
      - key: ADMIN_EMAIL
        value: admin@taskhelper.com
      - key: ADMIN_PASSWORD
        value: REPLACE_WITH_ADMIN_PASSWORD
      - key: ADMIN_FIRST_NAME
        value: Admin
      - key: ADMIN_LAST_NAME
        value: User
